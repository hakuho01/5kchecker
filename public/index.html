<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>5Kモダン価格チェッカー</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>5Kモダン価格チェッカー</h1>

      <section class="card-input-section">
        <label for="cards-input">
          枚数とカード名を 1 行ずつ入力してください（半角スペース区切り）:
        </label>
        <textarea
          id="cards-input"
          rows="8"
          placeholder="例:
4 稲妻
3 Brainstorm"
        ></textarea>

        <button id="calc-button">合計金額を計算</button>
      </section>

      <section class="result-section">
        <div id="status"></div>
        <div id="result-summary" class="result-summary" aria-hidden="true"></div>
        <table id="result-table">
          <thead>
            <tr>
              <th>カード名</th>
              <th>枚数</th>
              <th>単価</th>
              <th>小計</th>
            </tr>
          </thead>
          <tbody></tbody>
          <tfoot>
            <tr>
              <th colspan="3">合計</th>
              <th id="total-cell">-</th>
            </tr>
          </tfoot>
        </table>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
